<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Projets - EGCOM</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Gestion des Projets</h1>
            <div>
                <a href="edit-project.html" class="btn-primary">+ Nouveau Projet</a>
                <button onclick="logout()" class="btn-secondary" style="margin-left: 10px;">Déconnexion</button>
            </div>
        </div>

        <div class="projects-table">
            <table>
                <thead>
                    <tr>
                        <th>Titre</th>
                        <th>Lieu</th>
                        <th>Année</th>
                        <th>Catégorie</th>
                        <th>Date de création</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="projectsTableBody">
                    <tr>
                        <td colspan="6" style="text-align: center;">Chargement...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../assets/js/supabase-client.js"></script>
    <script src="../assets/js/admin.js"></script>
    <script>
        async function init() {
            await checkAuth();
            await loadAdminProjects();
        }
        
        init();
    </script>
</body>
</html>
