<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Candidatures EGCOM-PROJETS</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .login-box h2 {
            text-align: center;
            color: #003366;
            margin-bottom: 30px;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
        }
        
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .login-box button:hover {
            background: #002244;
        }
        
        .error-message {
            color: #DC143C;
            text-align: center;
            margin-top: 10px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        
        .admin-header h1 {
            color: #003366;
            margin: 0;
        }
        
        .logout-btn {
            padding: 10px 20px;
            background: #DC143C;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .candidatures-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .candidatures-table th {
            background: #003366;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        .candidatures-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .candidatures-table tr:hover {
            background: #f8f9fa;
        }
        
        .download-btn {
            padding: 6px 12px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            margin-right: 5px;
        }
        
        .download-btn:hover {
            background: #002244;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 16px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #003366 0%, #0052a3 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 32px;
            font-weight: 700;
        }
        
        .stat-card p {
            margin: 0;
            font-size: 14px;
            opacity: 0.9;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div id="loginSection" class="login-box">
        <h2>🔐 Accès Admin</h2>
        <input type="password" id="passwordInput" placeholder="Mot de passe" />
        <button onclick="login()">SE CONNECTER</button>
        <p id="loginError" class="error-message"></p>
    </div>

    <!-- Admin Dashboard -->
    <div id="adminSection" class="admin-container hidden">
        <div class="admin-header">
            <h1>📋 Gestion des Candidatures</h1>
            <button class="logout-btn" onclick="logout()">DÉCONNEXION</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="totalCandidatures">0</h3>
                <p>Total Candidatures</p>
            </div>
            <div class="stat-card">
                <h3 id="candidaturesJour">0</h3>
                <p>Aujourd'hui</p>
            </div>
            <div class="stat-card">
                <h3 id="candidaturesSemaine">0</h3>
                <p>Cette semaine</p>
            </div>
        </div>

        <table class="candidatures-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Nom</th>
                    <th>Email</th>
                    <th>Téléphone</th>
                    <th>Poste</th>
                    <th>Expérience</th>
                    <th>Pays</th>
                    <th>CV</th>
                    <th>Lettre</th>
                </tr>
            </thead>
            <tbody id="candidaturesBody">
                <tr>
                    <td colspan="9" class="no-data">Chargement...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Configuration
        const ADMIN_PASSWORD = 'EGCOM2026Admin!';
        const SUPABASE_URL = 'https://bdalhwzrbvnnibtsqsni.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkYWxod3pyYnZubmlidHNxc25pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTczMjUsImV4cCI6MjA5MTQ5MzMyNX0.Su_WowiZbRxhx_MEdoVvHfLjvISduLXrOpsBxaykhjw';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Vérifier si déjà connecté
        if (sessionStorage.getItem('adminLoggedIn') === 'true') {
            showAdmin();
        }

        function login() {
            const password = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('loginError');

            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                showAdmin();
            } else {
                errorMsg.textContent = 'Mot de passe incorrect';
            }
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('adminSection').classList.add('hidden');
            document.getElementById('passwordInput').value = '';
        }

        function showAdmin() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminSection').classList.remove('hidden');
            loadCandidatures();
        }

        async function loadCandidatures() {
            try {
                const { data: candidatures, error } = await supabaseClient
                    .from('candidatures')
                    .select('*')
                    .order('date_candidature', { ascending: false });

                if (error) throw error;

                const tbody = document.getElementById('candidaturesBody');
                
                if (!candidatures || candidatures.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="no-data">Aucune candidature pour le moment</td></tr>';
                    return;
                }

                // Calculer les statistiques
                const today = new Date().toDateString();
                const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
                
                const candidaturesToday = candidatures.filter(c => 
                    new Date(c.date_candidature).toDateString() === today
                ).length;
                
                const candidaturesWeek = candidatures.filter(c => 
                    new Date(c.date_candidature) >= weekAgo
                ).length;

                document.getElementById('totalCandidatures').textContent = candidatures.length;
                document.getElementById('candidaturesJour').textContent = candidaturesToday;
                document.getElementById('candidaturesSemaine').textContent = candidaturesWeek;

                // Afficher les candidatures
                tbody.innerHTML = candidatures.map(c => `
                    <tr>
                        <td>${new Date(c.date_candidature).toLocaleDateString('fr-FR')}</td>
                        <td><strong>${c.nom}</strong></td>
                        <td>${c.email}</td>
                        <td>${c.telephone}</td>
                        <td>${c.poste}</td>
                        <td>${c.experience}</td>
                        <td>${c.pays}</td>
                        <td>
                            ${c.cv_url ? `<button class="download-btn" onclick="downloadFile('${c.cv_url}')">📄 Télécharger</button>` : '-'}
                        </td>
                        <td>
                            ${c.lettre_url ? `<button class="download-btn" onclick="downloadFile('${c.lettre_url}')">📄 Télécharger</button>` : '-'}
                        </td>
                    </tr>
                `).join('');

            } catch (error) {
                console.error('Erreur:', error);
                document.getElementById('candidaturesBody').innerHTML = 
                    '<tr><td colspan="9" class="no-data">Erreur de chargement</td></tr>';
            }
        }

        async function downloadFile(fileName) {
            try {
                const { data, error } = await supabaseClient.storage
                    .from('Candidature')
                    .download(fileName);

                if (error) throw error;

                const url = URL.createObjectURL(data);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (error) {
                alert('Erreur lors du téléchargement: ' + error.message);
            }
        }

        // Permettre la connexion avec la touche Entrée
        document.getElementById('passwordInput')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
